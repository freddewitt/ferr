name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Tests unitaires + intégration (matrix multi-OS)
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # par2cmdline est requis pour les tests d'intégration PAR2
      - name: Install par2cmdline (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y par2

      - name: Install par2cmdline (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install par2

      - name: Install par2cmdline (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install par2 -y
        continue-on-error: true  # non bloquant si indisponible

      - name: Build
        run: cargo build --workspace

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests unitaires
        run: cargo test --workspace
        env:
          FERR_PAR2_STUB: ""  # utiliser le vrai par2 si installé

      - name: Tests d'intégration PAR2 (ignorés par défaut)
        run: cargo test -p ferr-par2 -- --include-ignored
        continue-on-error: true  # PAR2 peut être absent sur certains runners

  # ─────────────────────────────────────────────────────────────────
  # Vérification du format
  # ─────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ─────────────────────────────────────────────────────────────────
  # Build release + artefacts
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ferr
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: ferr
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ferr.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p ferr-cli

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ferr-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 30
